# Copiar a config.properties y completar.
# Variables de entorno: NVR_IP, NVR_PORT, NVR_USER, NVR_PASSWORD, NVR_ID, NVR_NAME, CHANNEL_NAMES, PLATFORM_URL, PLATFORM_KEY

nvr.ip=192.168.0.102
nvr.port=37777
nvr.user=admin
nvr.password=

# nvr.id debe coincidir con el ID del NVR en CronoApp (Cámaras NVR). Ej: número de serie o "nvr-porteria"
nvr.id=default

# Opcional: nombre para mostrar del NVR (aparece en alertas y en N8N)
# nvr.name=NVR Portería

# Opcional: nombres de canales (coma separada, en orden: canal 0, 1, 2...). Si no se define, se usa "Canal N"
# channel.names=Entrada principal,Hall,Estacionamiento,Perimetral

# Opción A: Cloud Function (Firebase)
# platform.url=https://us-central1-TU_PROYECTO.cloudfunctions.net/nvrAgentEvents
# platform.key=Bacar2026

# Opción B: N8N. Misma PC: http://localhost:5678/webhook/nvr-alertas
# Con HTTPS (Caddy): https://autbacar.dnsalias.com/webhook/nvr-alertas
platform.url=https://autbacar.dnsalias.com/webhook/nvr-alertas
platform.key=

# Túnel para video en vivo (opcional). Si está definido y platform.key es el agent_secret, el agente abre WebSocket al servidor túnel y puede servir vivo aunque el NVR esté en otra red.
# platform.tunnel_url=wss://tunnel-xxx.run.app

# Qué eventos enviar a la plataforma (whitelist). Vacío = enviar todos.
# Por defecto: solo VIDEOLOST_EX (pérdida señal), SHELTER_EX (obstrucción), ALARM_EX (humano/vehículo/IVS). No MOTION_EX ni DISKFULL_EX ni DISKERROR_EX.
event.types.include=VIDEOLOST_EX,SHELTER_EX,ALARM_EX

# Heartbeat/keepalive cada N segundos (0 = desactivado). Mismo webhook; body tiene "type":"heartbeat". En N8N podés filtrar por tipo.
# platform.heartbeat.interval.seconds=300
